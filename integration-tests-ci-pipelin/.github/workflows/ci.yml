name: PulseAlert CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependencies
        run: |
          pip install ruff flake8 mypy
          pip install -r requirements.txt -r requirements-dev.txt 2>/dev/null || true
      - name: Ruff check
        run: ruff check . --config pyproject.toml || ruff check .
      - name: Flake8
        run: flake8 . --max-line-length=120 --exclude=.git,__pycache__,venv
      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  test-integration:
    runs-on: ubuntu-latest
    needs: test-unit
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: pulsealert
          POSTGRES_PASSWORD: pulsealert_pass
          POSTGRES_DB: pulsealert_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Start service
        env:
          DATABASE_URL: postgresql://pulsealert:pulsealert_pass@localhost:5432/pulsealert_test
          SLACK_WEBHOOK_URL: http://localhost:8081/mock/slack
          DISCORD_WEBHOOK_URL: http://localhost:8081/mock/discord
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          TEST_MODE: "true"
        run: |
          python -m src.main &
          sleep 5
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://pulsealert:pulsealert_pass@localhost:5432/pulsealert_test
        run: pytest tests/integration/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/